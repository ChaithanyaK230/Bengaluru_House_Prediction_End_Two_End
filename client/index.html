<!DOCTYPE html>
<html>
<head>
    <title>Bangalore House Price Prediction</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="overlay"></div>

<div class="card">
    <h1>🏠 Bangalore Property Estimator</h1>
    <p class="subtitle">Find the estimated value of your dream home</p>

    <div class="input-group">
        <label>Total Area (sq.ft)</label>
        <input type="number" id="sqft" placeholder="e.g. 1200">
    </div>

    <div class="input-row">
        <div class="input-group">
            <label>Bathrooms</label>
            <input type="number" id="bath" placeholder="e.g. 2">
        </div>

        <div class="input-group">
            <label>BHK</label>
            <input type="number" id="bhk" placeholder="e.g. 3">
        </div>
    </div>

    <div class="input-group">
        <label>Location</label>
        <select id="location">
            <option disabled selected>Select a location</option>
        </select>
    </div>

    <button onclick="predictPrice()">Estimate Price</button>

    <div id="result" class="result-box"></div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
